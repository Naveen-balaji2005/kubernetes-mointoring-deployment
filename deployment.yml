apiVersion: apps/v1
kind: Deployment

metadata:
  name: website-pro

spec:
  replicas: 2

  selector:
    matchLabels:
      app: website

  template:
    metadata:
      labels:
        app: website

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"

    spec:
      containers:
      - name: website-pro

        image: naveenbalaji01/shoe-project:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service

metadata:
  name: website-service

  labels:
    app: website

spec:
  type: NodePort

  selector:
    app: website

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080

---

apiVersion: v1
kind: ServiceAccount

metadata:
  name: prometheus
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: prometheus

rules:
- apiGroups: [""]
  resources:
    - nodes
    - services
    - endpoints
    - pods

  verbs:
    - get
    - list
    - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: prometheus

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus

subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: default
